<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - EduPortal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="navbar">
                <h1>🎓 EduPortal</h1>
                <div class="nav-links">
                    <a th:href="@{/register}">Register</a>
                </div>
            </div>
        </div>

        <div class="card" style="max-width: 450px; margin: 2rem auto;">
            <div class="card-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your student account</p>
            </div>

            <!-- Success Message -->
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            
            <!-- Error Message -->
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            
            <!-- Logout Message -->
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" 
                           placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" 
                           placeholder="Enter your password" required>
                </div>

                <div class="form-group text-center">
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </div>
            </form>

            <div class="text-center mt-3">
                <p>Don't have an account? 
                    <a th:href="@{/register}" style="color: #667eea; font-weight: 600;">Register here</a>
                </p>
            </div>
        </div>

        <!-- Demo Credentials -->
        <div class="card" style="max-width: 450px; margin: 1rem auto; background: rgba(255, 255, 255, 0.8);">
            <div class="card-header">
                <h3 style="font-size: 1.2rem;">Demo Credentials</h3>
                <p style="font-size: 0.9rem; margin-bottom: 1rem;">Use these credentials or register a new account</p>
            </div>
            <div style="background: #f7fafc; padding: 1rem; border-radius: 8px; font-family: monospace;">
                <strong>Username:</strong> student1<br>
                <strong>Password:</strong> password123
            </div>
        </div>
    </div>

    <script>
        // Add some interactivity
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('.form-control');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.style.transform = 'scale(1.02)';
                });
                input.addEventListener('blur', function() {
                    this.style.transform = 'scale(1)';
                });
            });
        });
    </script>
</body>
</html>
